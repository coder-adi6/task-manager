<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f8fb; margin: 0; padding: 0; }
    .app { max-width: 980px; margin: 0 auto; padding: 20px; }
    header { margin-bottom: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 5px rgba(41, 65, 91, 0.08); }
    .grid { display: grid; gap: 16px; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; }
    .row > * { flex: 1; min-width: 180px; }
    input, select, textarea, button { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    button { cursor: pointer; background: #2563eb; color: #fff; border: none; }
    button.secondary { background: #6b7280; }
    .task { border-left: 4px solid #2563eb; padding: 12px 14px; margin-bottom: 12px; }
    .task.done { border-color: #16a34a; }
    .task-title { margin: 0 0 6px; }
    .task-meta { margin: 6px 0 0; color: #4b5563; font-size: 13px; }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const API_BASE = 'http://localhost:8000/api';

    function App() {
      const [view, setView] = useState('login');
      const [token, setToken] = useState(localStorage.getItem('taskManagerToken') || '');
      const [user, setUser] = useState(JSON.parse(localStorage.getItem('taskManagerUser') || 'null'));
      const [username, setUsername] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [projects, setProjects] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [projectFilter, setProjectFilter] = useState('');
      const [statusFilter, setStatusFilter] = useState('');
      const [newProjectName, setNewProjectName] = useState('');
      const [newProjectDescription, setNewProjectDescription] = useState('');
      const [newTaskTitle, setNewTaskTitle] = useState('');
      const [newTaskDescription, setNewTaskDescription] = useState('');
      const [newTaskProject, setNewTaskProject] = useState('');
      const [newTaskDueDate, setNewTaskDueDate] = useState('');
      const [error, setError] = useState('');

      useEffect(() => {
        if (token) {
          setView('app');
          loadProjects();
          loadTasks();
        }
      }, [token]);

      useEffect(() => {
        if (token) {
          loadTasks();
        }
      }, [projectFilter, statusFilter]);

      const authHeaders = () => ({
        'Content-Type': 'application/json',
        Authorization: `Token ${token}`,
      });

      const saveAuth = (tokenValue, userData) => {
        localStorage.setItem('taskManagerToken', tokenValue);
        localStorage.setItem('taskManagerUser', JSON.stringify(userData));
        setToken(tokenValue);
        setUser(userData);
      };

      const handleRegister = async () => {
        setError('');
        try {
          const response = await fetch(`${API_BASE}/auth/register/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || JSON.stringify(data));
          saveAuth(data.token, data.user);
          setUsername('');
          setEmail('');
          setPassword('');
        } catch (err) {
          setError(err.message);
        }
      };

      const handleLogin = async () => {
        setError('');
        try {
          const response = await fetch(`${API_BASE}/auth/login/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || JSON.stringify(data));
          saveAuth(data.token, data.user);
          setUsername('');
          setPassword('');
        } catch (err) {
          setError(err.message);
        }
      };

      const logout = () => {
        localStorage.removeItem('taskManagerToken');
        localStorage.removeItem('taskManagerUser');
        setToken('');
        setUser(null);
        setProjects([]);
        setTasks([]);
        setView('login');
      };

      const loadProjects = async () => {
        if (!token) return;
        const response = await fetch(`${API_BASE}/projects/`, { headers: authHeaders() });
        const data = await response.json();
        setProjects(data);
        if (!newTaskProject && data.length > 0) setNewTaskProject(data[0].id);
      };

      const loadTasks = async () => {
        if (!token) return;
        const params = new URLSearchParams();
        if (projectFilter) params.append('project', projectFilter);
        if (statusFilter) params.append('status', statusFilter);
        const response = await fetch(`${API_BASE}/tasks/?${params.toString()}`, { headers: authHeaders() });
        const data = await response.json();
        setTasks(data);
      };

      const createProject = async () => {
        if (!newProjectName) return;
        const response = await fetch(`${API_BASE}/projects/`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ name: newProjectName, description: newProjectDescription }),
        });
        if (response.ok) {
          setNewProjectName('');
          setNewProjectDescription('');
          loadProjects();
        }
      };

      const createTask = async () => {
        if (!newTaskTitle || !newTaskProject) return;
        const response = await fetch(`${API_BASE}/tasks/`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            project: newTaskProject,
            title: newTaskTitle,
            description: newTaskDescription,
            due_date: newTaskDueDate || null,
          }),
        });
        if (response.ok) {
          setNewTaskTitle('');
          setNewTaskDescription('');
          setNewTaskDueDate('');
          loadTasks();
        }
      };

      const updateTaskStatus = async (taskId, newStatus) => {
        await fetch(`${API_BASE}/tasks/${taskId}/`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ status: newStatus }),
        });
        loadTasks();
      };

      if (view === 'login' && !token) {
        return (
          <div className="app">
            <header>
              <h1>Task Manager</h1>
              <p>Register or login to manage projects and tasks.</p>
            </header>
            <div className="card">
              <div className="grid">
                <div>
                  <h2>{view === 'login' ? 'Login' : 'Register'}</h2>
                  {error && <p className="error">{error}</p>}
                  <input value={username} onChange={e => setUsername(e.target.value)} placeholder="Username" />
                  {view === 'register' && (
                    <input value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" />
                  )}
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Password" />
                  <button onClick={view === 'login' ? handleLogin : handleRegister}>
                    {view === 'login' ? 'Login' : 'Register'}
                  </button>
                  <button className="secondary" onClick={() => setView(view === 'login' ? 'register' : 'login')}>
                    {view === 'login' ? 'Create account' : 'Back to login'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="app">
          <header>
            <h1>Task Manager</h1>
            <p>Welcome, {user?.username}. Build projects, add tasks, and filter work by status.</p>
            <button className="secondary" onClick={logout}>Logout</button>
          </header>

          <div className="card">
            <h2>Create Project</h2>
            <div className="row">
              <input value={newProjectName} onChange={e => setNewProjectName(e.target.value)} placeholder="Project name" />
              <input value={newProjectDescription} onChange={e => setNewProjectDescription(e.target.value)} placeholder="Description" />
              <button onClick={createProject}>Add Project</button>
            </div>
          </div>

          <div className="card">
            <h2>Create Task</h2>
            <div className="row">
              <select value={newTaskProject} onChange={e => setNewTaskProject(e.target.value)}>
                <option value="">Select project</option>
                {projects.map(project => (
                  <option key={project.id} value={project.id}>{project.name}</option>
                ))}
              </select>
              <input value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)} placeholder="Task title" />
            </div>
            <div className="row">
              <textarea rows="2" value={newTaskDescription} onChange={e => setNewTaskDescription(e.target.value)} placeholder="Task description" />
              <input type="date" value={newTaskDueDate} onChange={e => setNewTaskDueDate(e.target.value)} />
              <button onClick={createTask}>Create Task</button>
            </div>
          </div>

          <div className="card">
            <h2>Filters</h2>
            <div className="row">
              <select value={projectFilter} onChange={e => setProjectFilter(e.target.value)}>
                <option value="">All projects</option>
                {projects.map(project => (
                  <option key={project.id} value={project.id}>{project.name}</option>
                ))}
              </select>
              <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
                <option value="">All statuses</option>
                <option value="todo">To Do</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
              </select>
              <button className="secondary" onClick={loadTasks}>Reload</button>
            </div>
          </div>

          <div className="card">
            <h2>Tasks</h2>
            {tasks.length === 0 ? (
              <p>No tasks found. Create a project and add tasks.</p>
            ) : (
              tasks.map(task => (
                <div key={task.id} className={`task ${task.status === 'done' ? 'done' : ''}`}>
                  <h3 className="task-title">{task.title}</h3>
                  <p>{task.description}</p>
                  <div className="task-meta">Project: {task.project_name} | Status: {task.status.replace('_', ' ')} | Due: {task.due_date || '—'}</div>
                  <div className="row" style={{ marginTop: '10px' }}>
                    <select value={task.status} onChange={e => updateTaskStatus(task.id, e.target.value)}>
                      <option value="todo">To Do</option>
                      <option value="in_progress">In Progress</option>
                      <option value="done">Done</option>
                    </select>
                    <button onClick={() => updateTaskStatus(task.id, task.status)}>Save</button>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
